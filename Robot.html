<!DOCTYPE html>
<html lang="fr">
<head>
  <title>Robot Control</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
  <!-- Ajouter dans le <head> -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: monospace; background: #111; color: #eee; text-align: center; padding: 20px; }
    h1 { margin-bottom: 20px; }

    .robots-container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 40px;
      flex-wrap: wrap;
    }

    .robot-panel {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
      width: 200px;
    }

    .robot-panel h2 { margin-bottom: 16px; }

    /* D-Pad */
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(3, 52px);
      gap: 4px;
      margin: 0 auto;
      width: fit-content;
    }

    .dpad button {
      width: 52px; height: 52px;
      font-size: 18px;
      background: #2a2a2a;
      color: #eee;
      border: 1px solid #444;
      border-radius: 6px;
      cursor: pointer;
    }

    .dpad button:hover { background: #3a3a3a; }
    .dpad button:active { background: #555; }
    .dpad .empty { visibility: hidden; }

    /* Sync button */
    .sync-section { margin-top: 30px; }

    #syncBtn {
      padding: 14px 36px;
      font-size: 16px;
      font-family: monospace;
      background: #222;
      color: #eee;
      border: 2px solid #555;
      border-radius: 8px;
      cursor: pointer;
    }

    #syncBtn:hover { background: #333; }
    #syncBtn.active { border-color: #4caf50; color: #4caf50; }

    /* Log */
    #log {
      margin: 30px auto 0;
      max-width: 500px;
      text-align: left;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 12px;
      height: 100px;
      overflow-y: auto;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <h1>Robot Control</h1>

  <div class="robots-container">

    <!-- Robot 1 -->
<div class="robot-panel">
  <h2>Robot 1</h2>
  <div class="dpad">
    <div class="empty"></div>
    <button onclick="cmd(1,'HAUT')"><i class="fas fa-arrow-up"></i></button>
    <div class="empty"></div>
    <button onclick="cmd(1,'GAUCHE')"><i class="fas fa-arrow-left"></i></button>
    <div class="empty"></div>
    <button onclick="cmd(1,'DROITE')"><i class="fas fa-arrow-right"></i></button>
    <div class="empty"></div>
    <button onclick="cmd(1,'BAS')"><i class="fas fa-arrow-down"></i></button>
    <div class="empty"></div>
  </div>
</div>

   <!-- Robot 2 -->
<div class="robot-panel">
  <h2>Robot 2</h2>
  <div class="dpad">
    <div class="empty"></div>
    <button onclick="cmd(2,'HAUT')"><i class="fas fa-arrow-up"></i></button>
    <div class="empty"></div>
    <button onclick="cmd(2,'GAUCHE')"><i class="fas fa-arrow-left"></i></button>
    <div class="empty"></div>
    <button onclick="cmd(2,'DROITE')"><i class="fas fa-arrow-right"></i></button>
    <div class="empty"></div>
    <button onclick="cmd(2,'BAS')"><i class="fas fa-arrow-down"></i></button>
    <div class="empty"></div>
  </div>
</div>

  </div>

 <!-- Sync -->
<div class="sync-section">
  <button id="syncBtn" onclick="toggleSync()">SYNC OFF</button>
</div>

<!-- Affichage écran -->
<div id="screen">
  <div id="lastCmd">En attente...</div>
</div>

<!-- Log -->
<div id="log">> Pret.</div>

<script>
  let sync = false;

  function toggleSync() {
    sync = !sync;
    const btn = document.getElementById('syncBtn');
    btn.textContent = sync ? 'SYNC ON' : 'SYNC OFF';
    btn.classList.toggle('active', sync);
    afficher(sync ? 'SYNC active' : 'SYNC desactive');
    log(sync ? '[SYNC] Active' : '[SYNC] Desactive');
  }

  function cmd(robot, dir) {
    if (sync) {
      afficher(`R1 + R2 -> ${dir}`);
      log(`[R1+R2] -> ${dir}`);
    } else {
      afficher(`R${robot} -> ${dir}`);
      log(`[R${robot}] -> ${dir}`);
    }
  }

  function afficher(msg) {
    document.getElementById('lastCmd').textContent = msg;
  }

  function log(msg) {
    const el = document.getElementById('log');
    el.innerHTML += `<div>> ${msg}</div>`;
    el.scrollTop = el.scrollHeight;
  }
</script>

</body>
</html>
